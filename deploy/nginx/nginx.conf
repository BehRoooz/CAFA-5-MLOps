worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    upstream go_prediction_api {
        server go-prediction-api:8000;
    }

    # Für die Admin-Konfiguration musst du je nach aktivem Profil
    # den Zielservice passend setzen.
    # Für deinen aktuellen AMD-Pfad:
    upstream embedding_api_admin {
        server embedding-api:8000;
    }

    upstream mlflow_api {
        server mlflow:5000;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ----------------------------
        # Öffentliche User-Endpunkte
        # ----------------------------

        location = /health {
            proxy_pass http://go_prediction_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /predict {
            proxy_pass http://go_prediction_api/predict;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optional: öffentlicher API-Health-Pfad
        location = /api/predict/health {
            proxy_pass http://go_prediction_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/predict {
            proxy_pass http://go_prediction_api/predict;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----------------------------
        # Admin-Endpunkte: Embedding API
        # ----------------------------

        location /admin/embed/ {
            auth_basic "Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd-admin;

            proxy_pass http://embedding_api_admin/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Optionaler kurzer Admin-Health-Pfad
        location = /admin/embed-health {
            auth_basic "Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd-admin;

            proxy_pass http://embedding_api_admin/api/v1/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----------------------------
        # Admin-Endpunkte: MLflow
        # ----------------------------

        location /admin/mlflow/ {
            auth_basic "Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd-admin;

            proxy_pass http://mlflow_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----------------------------
        # Defaults
        # ----------------------------

        location = / {
            return 404;
        }

        location / {
            return 404;
        }
    }
}
